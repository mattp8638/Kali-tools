tool_id: nikto_scan
name: Nikto Scan
description: "Web vulnerability scan via Nikto CLI wrapper."
category: Web Recon
module_path: scanning_host.tools.nikto_scan
entry_function: run
icon: scan
version: "1.0.0"
author: "Scanning App"
requires_root: false
tags: [web,vuln,nikto]

params:
  - name: target
    label: "Target URL"
    param_type: string
    required: true
    placeholder: "https://example.com"

  - name: timeout
    label: "Timeout (seconds)"
    param_type: integer
    required: false
    default: 600
