tool_id: cve_lookup
name: CVE Lookup
description: "Lookup CVEs by product/version keyword via NVD API."
category: Vulnerability
module_path: scanning_host.tools.cve_lookup
entry_function: run
icon: scan
version: "1.0.0"
author: "Scanning App"
requires_root: false
tags: [cve,nvd,intel]

params:
  - name: query
    label: "Search Query"
    param_type: string
    required: true
    placeholder: "OpenSSH 8.2"

  - name: limit
    label: "Max Results"
    param_type: integer
    required: false
    default: 10
