tool_id: arp_scan
name: ARP Scan
description: "Layer-2 host discovery on local network via ARP requests."
category: Network Discovery
module_path: scanning_host.tools.arp_scan
entry_function: run
icon: scan
version: "1.0.0"
author: "Scanning App"
requires_root: false
tags: [arp,lan,discovery]

params:
  - name: target
    label: "Local CIDR"
    param_type: string
    required: true
    placeholder: "192.168.1.0/24"

  - name: timeout
    label: "Timeout (seconds)"
    param_type: integer
    required: false
    default: 2
