tool_id: banner_grab
name: Banner Grab
description: "Raw TCP banner grabbing for service/version identification."
category: OSINT
module_path: scanning_host.tools.banner_grab
entry_function: run
icon: scan
version: "1.0.0"
author: "Scanning App"
requires_root: false
tags: [service,banner,tcp]

params:
  - name: target
    label: "Target Host"
    param_type: string
    required: true
    placeholder: "example.com"

  - name: ports
    label: "Ports"
    param_type: string
    required: false
    default: "21,22,25,80,110,143,443,445,3389"

  - name: timeout
    label: "Timeout (seconds)"
    param_type: integer
    required: false
    default: 2
