tool_id: udp_scan
name: UDP Scan
description: "UDP port scan for common services."
category: Port Scanning
module_path: scanning_host.tools.udp_scan
entry_function: run
icon: scan
version: "1.0.0"
author: "Scanning App"
requires_root: false
tags: [udp,ports,scan]

params:
  - name: target
    label: "Target Host"
    param_type: string
    required: true

  - name: ports
    label: "Ports"
    param_type: string
    required: false
    default: "53,67,68,69,123,137,161,500,514,520,1900,5353"

  - name: timeout
    label: "Timeout (seconds)"
    param_type: integer
    required: false
    default: 2
